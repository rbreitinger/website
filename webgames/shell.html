<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Games</title>
  <style>
    :root{
      --bg:         #ddeef8;
      --panel:      #f5f9fc;
      --text:       #1c2333;
      --muted:      #5a6a80;
      --border:     #1c2333;
      --border-soft:#b0c4d8;
    }
    html, body {
      margin: 0;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Consolas, "Lucida Console", "Courier New", monospace;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .wrap {
      width: 720px;
      padding: 18px 18px 22px 18px;
    }
    .titlebar {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin: 0 0 14px 0;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border-soft);
    }
    .titlebar h1 {
      margin: 0;
      font-size: 34px;
      letter-spacing: 2px;
      color: var(--text);
    }
    .subtitle {
      font-size: 12px;
      color: var(--muted);
    }
    canvas {
      display: block;
      margin: 0 auto;
      background: var(--panel);
      border: 2px solid var(--border);
      border-radius: 8px;
      box-shadow: 0 4px 16px rgba(0,80,160,.12);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="titlebar">
      <h1 id="gameTitle">Loading&hellip;</h1>
      <div class="subtitle" id="gameSubtitle"></div>
    </div>
    <canvas id="gameCanvas" width="560" height="320"></canvas>
  </div>
  <script src="shell.js"></script>
</body>
</html>
